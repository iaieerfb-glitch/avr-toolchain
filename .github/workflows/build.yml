name: Build AVR Toolchain

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git wget curl make gcc g++ \
            flex bison texinfo \
            libgmp-dev libmpfr-dev libmpc-dev \
            libisl-dev zlib1g-dev \
            gcc-arm-linux-gnueabi

      - name: Download binutils
        run: |
          wget https://ftp.gnu.org/gnu/binutils/binutils-2.43.tar.xz
          tar -xf binutils-2.43.tar.xz

      - name: Build binutils
        run: |
          mkdir build-binutils
          cd build-binutils
          ../binutils-2.43/configure \
            --target=avr \
            --host=arm-linux-gnueabi \
            --prefix=$HOME/avr-toolchain \
            --disable-nls \
            --disable-werror
          make -j$(nproc)
          make install

      - name: Download GCC
        run: |
          wget https://ftp.gnu.org/gnu/gcc/gcc-14.2.0/gcc-14.2.0.tar.xz
          tar -xf gcc-14.2.0.tar.xz
          cd gcc-14.2.0
          ./contrib/download_prerequisites

      - name: Build GCC
        run: |
          mkdir build-gcc
          cd build-gcc
          PATH=$HOME/avr-toolchain/bin:$PATH \
          ../gcc-14.2.0/configure \
            --target=avr \
            --host=arm-linux-gnueabi \
            --prefix=$HOME/avr-toolchain \
            --enable-languages=c,c++ \
            --disable-nls \
            --disable-libssp \
            --disable-libada \
            --disable-libquadmath \
            --disable-shared \
            --disable-threads \
            --with-dwarf2 \
            --with-gnu-as \
            --with-gnu-ld
          make -j$(nproc)
          make install

      - name: Package
        run: |
          cd $HOME
          tar -cf avr-toolchain.tar avr-toolchain

      - name: Delete old release if exists
        run: |
          gh release delete v1.0 --yes --repo ${{ github.repository }} 2>/dev/null || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ~/avr-toolchain.tar
          tag_name: v1.0
          name: AVR Toolchain
          body: AVR Toolchain for Termux ARM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}







