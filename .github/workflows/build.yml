name: Build AVR Toolchain

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git wget curl make gcc g++ \
            flex bison texinfo \
            libgmp-dev libmpfr-dev libmpc-dev \
            libisl-dev zlib1g-dev

      - name: Download binutils
        run: |
          wget https://ftp.gnu.org/gnu/binutils/binutils-2.43.tar.xz
          tar -xf binutils-2.43.tar.xz

      - name: Build binutils
        run: |
          mkdir build-binutils
          cd build-binutils
          ../binutils-2.43/configure \
            --target=avr \
            --prefix=$HOME/avr-toolchain \
            --disable-nls \
            --disable-werror
          make -j$(nproc)
          make install

      - name: Download GCC
        run: |
          wget https://ftp.gnu.org/gnu/gcc/gcc-14.2.0/gcc-14.2.0.tar.xz
          tar -xf gcc-14.2.0.tar.xz
          cd gcc-14.2.0
          ./contrib/download_prerequisites

      - name: Build GCC
        run: |
          mkdir build-gcc
          cd build-gcc
          PATH=$HOME/avr-toolchain/bin:$PATH \
          ../gcc-14.2.0/configure \
            --target=avr \
            --prefix=$HOME/avr-toolchain \
            --enable-languages=c,c++ \
            --disable-nls \
            --disable-libssp \
            --disable-libada \
            --disable-libquadmath \
            --disable-shared \
            --disable-threads \
            --with-dwarf2 \
            --with-gnu-as \
            --with-gnu-ld
          make -j$(nproc)
          make install

      - name: Package
        run: |
          cd $HOME
          tar -cJf avr-toolchain.tar.xz avr-toolchain

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: avr-toolchain
          path: ~/avr-toolchain.tar.xz

